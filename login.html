<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLink - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <a href="index.html" class="login-logo">
                <i class="bi bi-app-indicator"></i>
                FoodLink
            </a>

            <div class="text-center mb-4">
                <span class="login-etiqueta">Acceso a la plataforma</span>
                <h1 class="login-title">Bienvenido nuevamente</h1>
                <p class="login-description">
                    Ingrese sus credenciales para acceder al sistema de gestión de donaciones.
                </p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control login-input" id="correo"
                        placeholder="ejemplo@correo.com">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control login-input" id="password"
                        placeholder="Ingrese su contraseña">
                </div>

                <div class="mb-4">
                    <label for="rol" class="form-label">Tipo de usuario</label>
                    <select class="form-select login-input" id="rol">
                        <option value="">Seleccione un rol</option>
                        <option value="donante">Donante</option>
                        <option value="beneficiario">Beneficiario</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>

                <p id="mensajeLogin" class="mensaje-login"></p>

                <button type="submit" class="btn btn-success w-100 login-button">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="index.html" class="volver-link">
                    <i class="bi bi-arrow-left me-1"></i>Volver al inicio
                </a>
            </div>

        </section>

    </main>

    <script src="./js/login.js"></script>
</body>

</html>
